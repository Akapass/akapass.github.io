<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ⚠️ MONETAG VERIFICATION TAG (DO NOT REMOVE) -->
    <meta name="monetag" content="60c54a93d3dcebcfbcb94c60f7905a6c">
    
    <title>Secure Verification | Step 1 of 2</title>

    <!-- ⚠️ MONETAG IN-PAGE PUSH SCRIPT (This is for the Ads) -->
    <script src="https://alwingulla.com/88/p.js"></script> 

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 1.5rem; text-align: center; width: 90%; max-width: 400px; border: 1px solid #334155; }
        .timer { font-size: 5rem; font-weight: 800; color: var(--accent); margin: 1.5rem 0; }
        .btn { background: var(--accent); color: #0f172a; border: none; padding: 1.2rem; width: 100%; border-radius: 1rem; font-weight: 700; cursor: pointer; }
        .btn:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="card">
        <div id="stepLabel" style="color: #94a3b8; font-size: 0.8rem; letter-spacing: 2px;">STEP 1 OF 2</div>
        <h2 id="title">Unlocking Access</h2>
        <div class="timer" id="timer">30</div>
        <button id="actionBtn" class="btn" disabled>PLEASE WAIT...</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hookUrl = decodeURIComponent(urlParams.get('hook'));
        const botId = urlParams.get('bid');

        let currentStep = 1;
        let timeLeft = 30;
        const timerEl = document.getElementById('timer');
        const btnEl = document.getElementById('actionBtn');

        function startTimer() {
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    btnEl.disabled = false;
                    btnEl.innerText = currentStep === 1 ? "NEXT STEP" : "CLAIM ACCESS NOW";
                }
            }, 1000);
        }

        btnEl.onclick = () => {
            if (currentStep === 1) {
                // 💡 MONETAG DIRECT LINK (Open ad in new tab)
                window.open('https://your-monetag-direct-link.com', '_blank');
                
                currentStep = 2;
                timeLeft = 30;
                btnEl.disabled = true;
                btnEl.innerText = "WAITING...";
                document.getElementById('stepLabel').innerText = "STEP 2 OF 2";
                timerEl.innerText = "30";
                startTimer();
            } else {
                fetch(hookUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({bid: botId})
                })
                .then(() => {
                    document.body.innerHTML = "<h1 style='color: #22c55e'>✅ VERIFIED!</h1><p>Access granted. Return to the bot.</p>";
                });
            }
        };

        if (hookUrl) startTimer();
    </script>
</body>
</html>
