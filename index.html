<head>

    <title>Secure Verification | Network Hub</title>

    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .card { background: var(--card); padding: 2.5rem; border-radius: 1.5rem; text-align: center; width: 90%; max-width: 400px; border: 1px solid #1e293b; box-shadow: 0 0 50px rgba(56, 189, 248, 0.1); display: none; }
        
        .timer { font-size: 6rem; font-weight: 900; color: var(--accent); margin: 1.5rem 0; line-height: 1; }
        .btn { background: var(--accent); color: #020617; border: none; padding: 1.2rem; width: 100%; border-radius: 1rem; font-weight: 800; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        /* Adblock Overlay */
        #adblock-msg { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .warning-icon { font-size: 4rem; color: var(--danger); margin-bottom: 1rem; }
        #loading-screen { display: flex; flex-direction: column; align-items: center; }
        
        /* Spinner */
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="triggerPop()">

    <!-- 1. Initial Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Initializing Security Check...</p>
    </div>

    <!-- 2. Anti-Adblock Screen -->
    <div id="adblock-msg">
        <div class="warning-icon">⚠️</div>
        <h2>Adblocker Detected!</h2>
        <p>To access the bot, you must disable your Adblocker / Browser Shields and refresh.</p>
        <button class="btn" style="margin-top:20px;" onclick="location.reload()">I've Disabled It, Retry</button>
    </div>

    <!-- 3. Verification Card -->
    <div class="card" id="main-card">
        <div id="stepLabel" style="color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px;">Step 1 of 2</div>
        <h2 style="margin: 0.5rem 0;">Verifying User...</h2>
        <div class="timer" id="timer">30</div>
        <button id="actionBtn" class="btn" disabled>Wait for Ads...</button>
        <p style="font-size: 0.8rem; color: #475569; margin-top: 1.5rem;">Ads help us keep this service free</p>
    </div>

    <!-- The Honey Pot -->
    <div class="ad-zone-check pub_300x250" style="position:absolute; left:-999px; width:1px; height:1px;" id="ad-check"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hookUrl = urlParams.get('hook'); 
        const botApi = urlParams.get('api');   
        const userId = urlParams.get('uid');
        const botId = urlParams.get('bid');
        const directLink = "https://omg10.com/4/10798497";

        let currentStep = 1;
        let timeLeft = 30;
        let isPaused = false;

        function triggerPop() {
            window.open(directLink, '_blank');
        }

        // Timer pauses if user leaves the tab
        window.onblur = () => { isPaused = true; };
        window.onfocus = () => { isPaused = false; };

        function startTimer() {
            const countdown = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        const btn = document.getElementById('actionBtn');
                        btn.disabled = false;
                        btn.innerText = currentStep === 1 ? "Proceed to Step 2" : "Claim Access Now";
                    }
                }
            }, 1000);
        }

        // THE CORE FIX: Reliable Adblock Detection
        function runSecurityCheck() {
            const adCheck = document.getElementById('ad-check');
            const loading = document.getElementById('loading-screen');
            const adblockMsg = document.getElementById('adblock-msg');
            const mainCard = document.getElementById('main-card');

            loading.style.display = 'none';

            // Check if honey pot is hidden OR Monetag failed to load
            const isBlocked = (adCheck.offsetParent === null || adCheck.offsetHeight === 0);

            if (isBlocked) {
                adblockMsg.style.display = 'flex';
                mainCard.style.display = 'none';
            } else {
                adblockMsg.style.display = 'none';
                mainCard.style.display = 'block';
                startTimer();
            }
        }

        // Wait 2.5 seconds for scripts to load before checking
        setTimeout(runSecurityCheck, 2500);

        document.getElementById('actionBtn').onclick = (e) => {
            e.stopPropagation();
            triggerPop();

            if (currentStep === 1) {
                currentStep = 2;
                timeLeft = 30;
                document.getElementById('actionBtn').disabled = true;
                document.getElementById('actionBtn').innerText = "Processing...";
                document.getElementById('stepLabel').innerText = "Step 2 of 2";
                document.getElementById('timer').innerText = "30";
                startTimer();
            } else {
                document.getElementById('actionBtn').innerText = "Unlocking...";
                let finalUrl = botApi ? `${botApi}/verify?uid=${userId}` : decodeURIComponent(hookUrl);

                fetch(finalUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: userId, bid: botId})
                }).then(() => {
                    document.body.innerHTML = `<div class="card" style="display:block">
                        <h1 style="color: #22c55e">✅ SUCCESS</h1>
                        <p>Access Granted. Return to Telegram.</p>
                    </div>`;
                }).catch(() => {
                    alert("Confirmed! You can close this window.");
                });
            }
        };
    </script>
</body>
</html>
