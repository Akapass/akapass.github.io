    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .card { background: var(--card); padding: 2.5rem; border-radius: 1.5rem; text-align: center; width: 90%; max-width: 400px; border: 1px solid #1e293b; box-shadow: 0 0 50px rgba(56, 189, 248, 0.1); position: relative; z-index: 10; }
        
        .timer { font-size: 6rem; font-weight: 900; color: var(--accent); margin: 1rem 0; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3); transition: 0.3s; }
        .timer.paused { color: var(--danger); opacity: 0.5; }

        .btn { background: var(--accent); color: #020617; border: none; padding: 1.2rem; width: 100%; border-radius: 1rem; font-weight: 800; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; transition: 0.2s; }
        .btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        /* Anti-Adblock Overlay */
        #adblock-msg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .warning-icon { font-size: 4rem; color: var(--danger); margin-bottom: 1rem; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #22c55e; margin-right: 5px; }
        .paused-text { display: none; color: var(--danger); font-size: 0.8rem; font-weight: bold; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body onclick="triggerPop()">

    <!-- Anti-Adblock Screen -->
    <div id="adblock-msg">
        <div class="warning-icon">⚠️</div>
        <h2>Adblocker Detected!</h2>
        <p>To access this bot, you must disable your Adblocker and refresh the page.</p>
        <button class="btn" onclick="location.reload()">I've Disabled It</button>
    </div>

    <!-- Verification Card -->
    <div class="card" id="main-card">
        <div id="stepLabel" style="color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px;">Step 1 of 2</div>
        <h2 style="margin: 0.5rem 0;">Verifying User...</h2>
        
        <div class="timer" id="timer">30</div>
        <div class="paused-text" id="paused-hint">Timer Paused: Keep this tab open!</div>
        
        <button id="actionBtn" class="btn" disabled>Wait for Ads...</button>
        
        <p style="font-size: 0.8rem; color: #475569; margin-top: 1.5rem;">
            <span class="status-dot"></span> Live Verification System
        </p>
    </div>

    <!-- This invisible div is a "Honey Pot" for Adblockers -->
    <div class="ad-zone-check adsbox" style="position:absolute; left:-999px;" id="ad-check">&nbsp;</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hookUrl = urlParams.get('hook'); // TBC Webhook
        const botApi = urlParams.get('api');   // Render Python API
        const userId = urlParams.get('uid');
        const botId = urlParams.get('bid');
        const directLink = "https://omg10.com/4/10798497";

        let currentStep = 1;
        let timeLeft = 30;
        let isPaused = false;
        let timerStarted = false;

        const timerEl = document.getElementById('timer');
        const btnEl = document.getElementById('actionBtn');
        const stepLabel = document.getElementById('stepLabel');
        const pausedHint = document.getElementById('paused-hint');

        // 1. Anti-Adblock Check
        function checkAdBlock() {
            const adCheck = document.getElementById('ad-check');
            if (adCheck.offsetHeight === 0 || !window.monetag) {
                document.getElementById('adblock-msg').style.display = 'flex';
                document.getElementById('main-card').style.display = 'none';
                return true;
            }
            return false;
        }

        // 2. Aggressive Pop Logic
        function triggerPop() {
            window.open(directLink, '_blank');
        }

        // 3. Focus Timer (Stops if user leaves tab)
        window.onblur = () => { 
            isPaused = true; 
            timerEl.classList.add('paused');
            pausedHint.style.display = 'block';
        };
        window.onfocus = () => { 
            isPaused = false; 
            timerEl.classList.remove('paused');
            pausedHint.style.display = 'none';
        };

        function startTimer() {
            if(timerStarted) return;
            timerStarted = true;
            const countdown = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    timerEl.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        timerStarted = false;
                        btnEl.disabled = false;
                        btnEl.innerText = currentStep === 1 ? "Proceed to Step 2" : "Claim Access Now";
                    }
                }
            }, 1000);
        }

        btnEl.onclick = (e) => {
            e.stopPropagation();
            triggerPop(); // Harsh Pop

            if (currentStep === 1) {
                currentStep = 2;
                timeLeft = 30;
                btnEl.disabled = true;
                btnEl.innerText = "Processing...";
                stepLabel.innerText = "Step 2 of 2";
                timerEl.innerText = "30";
                startTimer();
            } else {
                btnEl.disabled = true;
                btnEl.innerText = "Unlocking...";
                
                // FINAL VERIFICATION: Support for TBC and Python Bots
                let finalUrl = "";
                if (botApi) {
                    finalUrl = `${botApi}/verify?uid=${userId}`;
                } else if (hookUrl) {
                    finalUrl = decodeURIComponent(hookUrl);
                }

                fetch(finalUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid: userId, bid: botId})
                }).then(() => {
                    document.body.innerHTML = `
                        <div class="card">
                            <h1 style="color: #22c55e">✅ SUCCESS</h1>
                            <p>Verification data updated in bot database.</p>
                            <p>You can return to Telegram now.</p>
                        </div>`;
                }).catch(() => {
                    alert("Verification confirmed! If you don't have access, please refresh.");
                });
            }
        };

        // Initial Start
        window.onload = () => {
            if (!checkAdBlock()) {
                if (userId || hookUrl) {
                    startTimer();
                } else {
                    document.body.innerHTML = "<h1>❌ Invalid Link</h1>";
                }
            }
        };
    </script>
</body>
</html>
